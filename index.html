<html>
<head>
    <script>
        const uid = "uid" + Math.random();
        let peerConnection;
        let dataChannel;

        const serverConnection = new WebSocket('ws://' + window.location.hostname + ':4000');
        serverConnection.onmessage = gotMessageFromServer;

        // ──────────────────────────────────────────────
        // BOTH PEERS: runs on page load
        // ──────────────────────────────────────────────
        function startup() {
            document.getElementById('connectButton').addEventListener('click', connectPeers, false);
            document.getElementById('sendButton').addEventListener('click', sendMessage, false);
            peerConnection = new RTCPeerConnection(); //add STUN/TURN here
            peerConnection.onicecandidate = gotIceCandidate;
            peerConnection.ondatachannel = gotDataChannel;
        }

        // ──────────────────────────────────────────────
        // BOTH PEERS: send a message over the data channel
        // ──────────────────────────────────────────────
        function sendMessage() {
            if (!dataChannel || dataChannel.readyState !== 'open') {
                console.log('Data channel not open yet');
                return;
            }
            let messageInputBox = document.getElementById('message_send');
            console.log('Send message: ' + messageInputBox.value);
            dataChannel.send(messageInputBox.value);
            messageInputBox.value = "";
            messageInputBox.focus();
        }

        // ──────────────────────────────────────────────
        // OFFERER STEP 1: user clicks Connect
        //   - creates the data channel (only offerer does this)
        //   - creates an SDP offer
        //   → triggers createdDescription()
        // ──────────────────────────────────────────────
        function connectPeers() {
            dataChannel = peerConnection.createDataChannel("test");
            setupDataChannel(dataChannel);
            peerConnection.createOffer().then(createdDescription).catch(errorHandler);
        }

        // ──────────────────────────────────────────────
        // OFFERER STEP 2 / ANSWERER STEP 2:
        //   - sets local description (offer or answer)
        //   - sends it to the other peer via signaling server
        //   → ICE gathering starts, triggers gotIceCandidate()
        // ──────────────────────────────────────────────
        function createdDescription(description) {
            console.log('Got description');
            peerConnection.setLocalDescription(description).then(function() {
                serverConnection.send(JSON.stringify({'sdp': peerConnection.localDescription, 'uid': uid}));
            }).catch(errorHandler);
        }

        // ──────────────────────────────────────────────
        // ANSWERER STEP 3: fires when the offerer's data channel arrives
        //   - reassigns global dataChannel so answerer can send too
        // ──────────────────────────────────────────────
        function gotDataChannel(event) {
            console.log('Got data channel');
            dataChannel = event.channel;
            setupDataChannel(dataChannel);
        }

        // ──────────────────────────────────────────────
        // BOTH PEERS: wire up onmessage/onopen for whichever
        // side created or received the data channel
        // ──────────────────────────────────────────────
        function setupDataChannel(channel) {
            channel.onmessage = function(event) {
                let receiveBox = document.getElementById('message_rcv');
                receiveBox.value = event.data;
            };
            channel.onopen = function() {
                console.log('Data channel open');
            };
        }

        // ──────────────────────────────────────────────
        // ANSWERER STEP 1 / BOTH PEERS (ICE):
        //   - receives SDP or ICE candidate from signaling server
        //   - if SDP offer → setRemoteDescription, then createAnswer
        //     → triggers createdDescription() (answerer step 2)
        //   - if SDP answer → setRemoteDescription (offerer done)
        //   - if ICE candidate → addIceCandidate
        // ──────────────────────────────────────────────
        function gotMessageFromServer(message) {
            const signal = JSON.parse(message.data);
            if(signal.uid === uid) return;

            console.log('Got message from signaling server: '+message.data);
            if(signal.sdp) {
                peerConnection.setRemoteDescription(new RTCSessionDescription(signal.sdp)).then(function() {
                    if(signal.sdp.type === 'offer') {
                        peerConnection.createAnswer().then(createdDescription).catch(errorHandler);
                    }
                }).catch(errorHandler);
            } else if(signal.ice) {
                peerConnection.addIceCandidate(new RTCIceCandidate(signal.ice)).catch(errorHandler);
            }
        }

        // ──────────────────────────────────────────────
        // BOTH PEERS: fires as ICE candidates are gathered
        //   - sends each candidate to the other peer via signaling server
        // ──────────────────────────────────────────────
        function gotIceCandidate(event) {
            if(event.candidate != null) {
                let iceCandidate = JSON.stringify({'ice': event.candidate, 'uid': uid});
                console.log('Got ICE candidate: '+iceCandidate);
                serverConnection.send(iceCandidate);
            }
        }

        function errorHandler(error) {
            console.log("Error: "+error);
        }

        window.addEventListener("load", function() {
            startup();
        });
    </script>
</head>
<body>

<button id="connectButton">Connect</button>
<label for="message_send">Enter a message:
    <input type="text" id="message_send" placeholder="Message send" size=30 maxlength=30>
</label>
<button id="sendButton">Send</button>
<label for="message_rcv">Messages received:
    <input type="text" id="message_rcv" placeholder="Message received" size=30 maxlength=30 disabled>
</label>

</body>
</html>
